<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SecretMail — 作成</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0f14;
      --surface:#161a22;
      --border:#2a2f3d;
      --accent:#6366f1;
      --accent-dim:#4f52c4;
      --text:#e8eaf0;
      --sub:#8b93a8;
      --danger:#ef4444;
      --success:#22c55e;
    }
    body{
      background:var(--bg);
      color:var(--text);
      font-family:'Noto Sans JP',sans-serif;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:24px 16px 48px;
    }
    header{
      width:100%;
      max-width:560px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:32px;
    }
    .logo{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:700;
      font-size:18px;
      letter-spacing:.5px;
    }
    .logo-icon{
      width:36px;height:36px;
      background:var(--accent);
      border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      font-size:18px;
    }
    .nav-link{
      color:var(--sub);
      text-decoration:none;
      font-size:13px;
      border:1px solid var(--border);
      padding:6px 14px;
      border-radius:8px;
      transition:.2s;
    }
    .nav-link:hover{color:var(--text);border-color:var(--accent)}
    .card{
      width:100%;
      max-width:560px;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:16px;
      padding:28px 24px;
    }
    .card-title{
      font-size:14px;
      color:var(--sub);
      text-transform:uppercase;
      letter-spacing:1px;
      margin-bottom:20px;
      display:flex;align-items:center;gap:8px;
    }
    .card-title::before{
      content:'';
      display:block;width:4px;height:14px;
      background:var(--accent);border-radius:2px;
    }
    .field{margin-bottom:18px}
    label{
      display:block;
      font-size:13px;
      color:var(--sub);
      margin-bottom:7px;
    }
    input,textarea{
      width:100%;
      background:#0d0f14;
      border:1px solid var(--border);
      border-radius:10px;
      color:var(--text);
      font-family:inherit;
      font-size:14px;
      padding:11px 14px;
      outline:none;
      transition:.2s;
      resize:none;
    }
    input:focus,textarea:focus{border-color:var(--accent)}
    textarea{min-height:160px;line-height:1.7}
    .pw-wrap{position:relative}
    .pw-wrap input{padding-right:44px}
    .eye-btn{
      position:absolute;right:12px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;color:var(--sub);
      font-size:18px;line-height:1;padding:4px;
      transition:.2s;
    }
    .eye-btn:hover{color:var(--text)}
    .pw-strength{
      height:3px;
      border-radius:2px;
      margin-top:8px;
      background:var(--border);
      overflow:hidden;
    }
    .pw-strength-bar{
      height:100%;width:0%;
      border-radius:2px;
      transition:width .3s,background .3s;
    }
    .pw-hint{font-size:12px;color:var(--sub);margin-top:5px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    select{
      width:100%;
      background:#0d0f14;
      border:1px solid var(--border);
      border-radius:10px;
      color:var(--text);
      font-family:inherit;
      font-size:14px;
      padding:11px 14px;
      outline:none;
      cursor:pointer;
    }
    select:focus{border-color:var(--accent)}
    .btn{
      width:100%;
      padding:13px;
      background:var(--accent);
      border:none;
      border-radius:10px;
      color:#fff;
      font-family:inherit;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:.2s;
      margin-top:4px;
    }
    .btn:hover{background:var(--accent-dim)}
    .btn:disabled{opacity:.5;cursor:not-allowed}

    /* 完了モーダル */
    .overlay{
      display:none;
      position:fixed;inset:0;
      background:rgba(0,0,0,.7);
      z-index:100;
      align-items:center;justify-content:center;
    }
    .overlay.show{display:flex}
    .modal{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:20px;
      padding:32px 28px;
      width:min(480px,92vw);
      text-align:center;
    }
    .modal-icon{font-size:48px;margin-bottom:12px}
    .modal h2{font-size:20px;margin-bottom:8px}
    .modal p{font-size:13px;color:var(--sub);margin-bottom:20px;line-height:1.6}
    .url-box{
      background:#0d0f14;
      border:1px solid var(--border);
      border-radius:10px;
      padding:12px 14px;
      font-size:12px;
      word-break:break-all;
      color:var(--accent);
      margin-bottom:16px;
      text-align:left;
      line-height:1.5;
    }
    .modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .btn-outline{
      padding:11px;
      background:none;
      border:1px solid var(--border);
      border-radius:10px;
      color:var(--text);
      font-family:inherit;
      font-size:14px;
      cursor:pointer;
      transition:.2s;
    }
    .btn-outline:hover{border-color:var(--accent);color:var(--accent)}
    .btn-copy{
      padding:11px;
      background:var(--accent);
      border:none;
      border-radius:10px;
      color:#fff;
      font-family:inherit;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:.2s;
    }
    .btn-copy:hover{background:var(--accent-dim)}
    .copied-msg{
      font-size:12px;
      color:var(--success);
      height:16px;
      margin-top:6px;
    }
    @media(max-width:480px){
      .row{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon">✉</div>
      SecretMail
    </div>
    <a href="read.html" class="nav-link">📖 読む</a>
  </header>

  <div class="card">
    <div class="card-title">新しい手紙を書く</div>

    <div class="field">
      <label>件名（省略可）</label>
      <input type="text" id="title" placeholder="件名なし">
    </div>

    <div class="field">
      <label>本文 <span style="color:var(--danger)">*</span></label>
      <textarea id="body" placeholder="ここに秘密のメッセージを書いてね..."></textarea>
    </div>

    <div class="row">
      <div class="field">
        <label>パスワード <span style="color:var(--danger)">*</span></label>
        <div class="pw-wrap">
          <input type="password" id="pw" placeholder="8文字以上推奨" autocomplete="new-password">
          <button class="eye-btn" id="eye1" type="button">👁</button>
        </div>
        <div class="pw-strength"><div class="pw-strength-bar" id="pw-bar"></div></div>
        <div class="pw-hint" id="pw-hint"></div>
      </div>

      <div class="field">
        <label>パスワード確認 <span style="color:var(--danger)">*</span></label>
        <div class="pw-wrap">
          <input type="password" id="pw2" placeholder="もう一度入力" autocomplete="new-password">
          <button class="eye-btn" id="eye2" type="button">👁</button>
        </div>
        <div class="pw-hint" id="pw2-hint"></div>
      </div>
    </div>

    <div class="field">
      <label>有効期限</label>
      <select id="expire">
        <option value="1">1時間</option>
        <option value="24" selected>24時間</option>
        <option value="72">3日</option>
        <option value="168">7日</option>
        <option value="0">無期限</option>
      </select>
    </div>

    <button class="btn" id="send-btn" disabled>🔒 暗号化して送信</button>
  </div>

  <!-- 完了モーダル -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-icon">🔐</div>
      <h2>送信完了！</h2>
      <p>このURLとパスワードを相手に教えてね。<br>URLだけでは読めないよ。</p>
      <div class="url-box" id="result-url"></div>
      <div class="copied-msg" id="copied-msg"></div>
      <div class="modal-btns">
        <button class="btn-outline" id="new-btn">新しく書く</button>
        <button class="btn-copy" id="copy-btn">URLをコピー</button>
      </div>
    </div>
  </div>

  <script type="module">
    import{createClient}from'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL='https://mgzjlepljswyttjkljsh.supabase.co';
    const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1nempsZXBsanN3eXR0amtsanNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMzkzNDcsImV4cCI6MjA4NzkxNTM0N30.l_Sj0ZHUJBBq4DyCdgU6cbMkePZdB6Rb3XM83PGc_3Y';
    const sb=createClient(SUPABASE_URL,SUPABASE_KEY);

    // ========== 暗号化ユーティリティ ==========
    const enc=new TextEncoder();
    const dec=new TextDecoder();

    function b64(buf){return btoa(String.fromCharCode(...new Uint8Array(buf)))}
    function unb64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}

    async function deriveKey(pw,salt){
      const keyMat=await crypto.subtle.importKey(
        'raw',enc.encode(pw),'PBKDF2',false,['deriveKey']
      );
      return crypto.subtle.deriveKey(
        {name:'PBKDF2',salt,iterations:310000,hash:'SHA-256'},
        keyMat,{name:'AES-GCM',length:256},false,['encrypt','decrypt']
      );
    }

    async function encrypt(text,pw){
      const salt=crypto.getRandomValues(new Uint8Array(16));
      const iv=crypto.getRandomValues(new Uint8Array(12));
      const key=await deriveKey(pw,salt);
      const cipher=await crypto.subtle.encrypt(
        {name:'AES-GCM',iv},key,enc.encode(text)
      );
      return{enc:b64(cipher),iv:b64(iv),salt:b64(salt)};
    }

    // ========== パスワード強度 ==========
    const pwBar=document.getElementById('pw-bar');
    const pwHint=document.getElementById('pw-hint');
    const pw2Hint=document.getElementById('pw2-hint');

    function checkStrength(pw){
      let score=0;
      if(pw.length>=8)score++;
      if(pw.length>=12)score++;
      if(/[A-Z]/.test(pw))score++;
      if(/[0-9]/.test(pw))score++;
      if(/[^A-Za-z0-9]/.test(pw))score++;
      return score;
    }

    const colors=['#ef4444','#f97316','#eab308','#22c55e','#6366f1'];
    const hints=['とても弱い','弱い','普通','強い','とても強い'];

    document.getElementById('pw').addEventListener('input',()=>{
      const v=document.getElementById('pw').value;
      if(!v){pwBar.style.width='0';pwHint.textContent='';validate();return}
      const s=checkStrength(v);
      pwBar.style.width=((s/5)*100)+'%';
      pwBar.style.background=colors[s-1]||colors[0];
      pwHint.style.color=colors[s-1]||colors[0];
      pwHint.textContent=hints[s-1]||hints[0];
      validate();
    });
    document.getElementById('pw2').addEventListener('input',()=>{
      const p=document.getElementById('pw').value;
      const p2=document.getElementById('pw2').value;
      if(p2&&p!==p2){
        pw2Hint.style.color='var(--danger)';
        pw2Hint.textContent='一致しないよ';
      }else if(p2){
        pw2Hint.style.color='var(--success)';
        pw2Hint.textContent='✓ 一致';
      }else{
        pw2Hint.textContent='';
      }
      validate();
    });
    document.getElementById('body').addEventListener('input',validate);

    function validate(){
      const body=document.getElementById('body').value.trim();
      const pw=document.getElementById('pw').value;
      const pw2=document.getElementById('pw2').value;
      document.getElementById('send-btn').disabled=
        !body||!pw||pw!==pw2||pw.length<1;
    }

    // ========== パスワード表示切替 ==========
    document.getElementById('eye1').addEventListener('click',()=>{
      const i=document.getElementById('pw');
      i.type=i.type==='password'?'text':'password';
    });
    document.getElementById('eye2').addEventListener('click',()=>{
      const i=document.getElementById('pw2');
      i.type=i.type==='password'?'text':'password';
    });

    // ========== 送信 ==========
    document.getElementById('send-btn').addEventListener('click',async()=>{
      const body=document.getElementById('body').value.trim();
      const title=document.getElementById('title').value.trim()||'(件名なし)';
      const pw=document.getElementById('pw').value;
      const expireH=parseInt(document.getElementById('expire').value);
      const btn=document.getElementById('send-btn');

      btn.disabled=true;
      btn.textContent='暗号化中...';

      try{
        const bodyEnc=await encrypt(body,pw);
        const titleEnc=await encrypt(title,pw);

        const expires=expireH>0
          ?new Date(Date.now()+expireH*3600*1000).toISOString()
          :null;

        const{data,error}=await sb
          .from('secret_letters')
          .insert({
            body_enc:bodyEnc.enc,
            body_iv:bodyEnc.iv,
            body_salt:bodyEnc.salt,
            title_enc:titleEnc.enc,
            title_iv:titleEnc.iv,
            title_salt:titleEnc.salt,
            expires_at:expires
          })
          .select('id')
          .single();

        if(error)throw error;

        const url=`${location.origin}/sites.google.com/read.html?id=${data.id}#youtube.com`;
        document.getElementById('result-url').textContent=url;
        document.getElementById('overlay').classList.add('show');

        document.getElementById('copy-btn').onclick=()=>{
          navigator.clipboard.writeText(url).then(()=>{
            document.getElementById('copied-msg').textContent='✓ コピーしました';
            setTimeout(()=>document.getElementById('copied-msg').textContent='',2000);
          });
        };
        document.getElementById('new-btn').onclick=()=>{
          document.getElementById('overlay').classList.remove('show');
          document.getElementById('body').value='';
          document.getElementById('title').value='';
          document.getElementById('pw').value='';
          document.getElementById('pw2').value='';
          pwBar.style.width='0';
          pwHint.textContent='';
          pw2Hint.textContent='';
          btn.textContent='🔒 暗号化して送信';
          validate();
        };

      }catch(e){
        alert('送信失敗: '+e.message);
        btn.disabled=false;
        btn.textContent='🔒 暗号化して送信';
      }
    });
  </script>
</body>
</html>
