<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SecretMail — 読む</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0f14;
      --surface:#161a22;
      --border:#2a2f3d;
      --accent:#6366f1;
      --accent-dim:#4f52c4;
      --text:#e8eaf0;
      --sub:#8b93a8;
      --danger:#ef4444;
      --success:#22c55e;
      --warn:#f59e0b;
    }
    body{
      background:var(--bg);
      color:var(--text);
      font-family:'Noto Sans JP',sans-serif;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:24px 16px 48px;
    }
    header{
      width:100%;
      max-width:560px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:32px;
    }
    .logo{
      display:flex;align-items:center;gap:10px;
      font-weight:700;font-size:18px;
    }
    .logo-icon{
      width:36px;height:36px;
      background:var(--accent);border-radius:10px;
      display:flex;align-items:center;justify-content:center;font-size:18px;
    }
    .nav-link{
      color:var(--sub);text-decoration:none;font-size:13px;
      border:1px solid var(--border);padding:6px 14px;border-radius:8px;transition:.2s;
    }
    .nav-link:hover{color:var(--text);border-color:var(--accent)}
    .card{
      width:100%;max-width:560px;
      background:var(--surface);border:1px solid var(--border);
      border-radius:16px;padding:28px 24px;
    }
    .card-title{
      font-size:14px;color:var(--sub);text-transform:uppercase;
      letter-spacing:1px;margin-bottom:20px;
      display:flex;align-items:center;gap:8px;
    }
    .card-title::before{
      content:'';display:block;width:4px;height:14px;
      background:var(--accent);border-radius:2px;
    }
    .field{margin-bottom:18px}
    label{display:block;font-size:13px;color:var(--sub);margin-bottom:7px}
    input{
      width:100%;background:#0d0f14;border:1px solid var(--border);
      border-radius:10px;color:var(--text);font-family:inherit;
      font-size:14px;padding:11px 14px;outline:none;transition:.2s;
    }
    input:focus{border-color:var(--accent)}
    .pw-wrap{position:relative}
    .pw-wrap input{padding-right:44px}
    .eye-btn{
      position:absolute;right:12px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;color:var(--sub);font-size:18px;
      line-height:1;padding:4px;transition:.2s;
    }
    .eye-btn:hover{color:var(--text)}
    .btn{
      width:100%;padding:13px;background:var(--accent);border:none;
      border-radius:10px;color:#fff;font-family:inherit;font-size:15px;
      font-weight:700;cursor:pointer;transition:.2s;margin-top:4px;
    }
    .btn:hover{background:var(--accent-dim)}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .err{
      background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);
      border-radius:10px;padding:12px 14px;font-size:13px;
      color:var(--danger);margin-top:12px;display:none;
    }
    .err.show{display:block}

    /* 結果 */
    .result-card{
      width:100%;max-width:560px;
      background:var(--surface);border:1px solid var(--border);
      border-radius:16px;padding:28px 24px;margin-top:16px;
      display:none;
    }
    .result-card.show{display:block}
    .result-header{
      display:flex;align-items:flex-start;justify-content:space-between;
      margin-bottom:20px;gap:12px;
    }
    .result-title{font-size:18px;font-weight:700;line-height:1.4}
    .expire-badge{
      font-size:11px;padding:4px 10px;border-radius:100px;
      background:rgba(245,158,11,.1);color:var(--warn);
      border:1px solid rgba(245,158,11,.3);white-space:nowrap;flex-shrink:0;
    }
    .divider{height:1px;background:var(--border);margin:16px 0}
    .result-body{
      font-size:15px;line-height:1.9;color:var(--text);
      white-space:pre-wrap;word-break:break-word;
    }
    .result-meta{
      font-size:12px;color:var(--sub);margin-top:20px;
      display:flex;gap:12px;flex-wrap:wrap;
    }
    .warn-banner{
      background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);
      border-radius:10px;padding:10px 14px;font-size:12px;color:var(--danger);
      margin-top:16px;line-height:1.6;
    }
    .btn-outline-sm{
      display:inline-block;margin-top:16px;padding:9px 18px;
      background:none;border:1px solid var(--border);border-radius:8px;
      color:var(--sub);font-family:inherit;font-size:13px;cursor:pointer;transition:.2s;
    }
    .btn-outline-sm:hover{border-color:var(--accent);color:var(--accent)}

    /* ローディング */
    .loading{
      display:none;width:100%;max-width:560px;
      text-align:center;padding:48px;
    }
    .loading.show{display:block}
    .spinner{
      width:36px;height:36px;border:3px solid var(--border);
      border-top-color:var(--accent);border-radius:50%;
      animation:spin .8s linear infinite;margin:0 auto 16px;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon">✉</div>
      SecretMail
    </div>
    <a href="write.html" class="nav-link">✏️ 書く</a>
  </header>

  <!-- ID入力フォーム -->
  <div class="card" id="form-card">
    <div class="card-title">手紙を読む</div>

    <div class="field">
      <label>手紙のID</label>
      <input type="text" id="letter-id" placeholder="URLから自動入力されます">
    </div>

    <div class="field">
      <label>パスワード <span style="color:var(--danger)">*</span></label>
      <div class="pw-wrap">
        <input type="password" id="pw" placeholder="送り主に聞いてね">
        <button class="eye-btn" id="eye-btn" type="button">👁</button>
      </div>
    </div>

    <button class="btn" id="unlock-btn">🔓 復号して読む</button>
    <div class="err" id="err-msg"></div>
  </div>

  <!-- ローディング -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div style="color:var(--sub);font-size:14px">復号中...</div>
  </div>

  <!-- 結果 -->
  <div class="result-card" id="result-card">
    <div class="result-header">
      <div class="result-title" id="r-title"></div>
      <div class="expire-badge" id="r-expire" style="display:none"></div>
    </div>
    <div class="divider"></div>
    <div class="result-body" id="r-body"></div>
    <div class="result-meta" id="r-meta"></div>
    <div class="warn-banner">
      ⚠️ この手紙はパスワードを知っている人なら誰でも読めます。スクリーンショットに注意してね。
    </div>
    <button class="btn-outline-sm" id="back-btn">← 別の手紙を読む</button>
  </div>

  <script type="module">
    import{createClient}from'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL='https://mgzjlepljswyttjkljsh.supabase.co';
    const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1nempsZXBsanN3eXR0amtsanNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMzkzNDcsImV4cCI6MjA4NzkxNTM0N30.l_Sj0ZHUJBBq4DyCdgU6cbMkePZdB6Rb3XM83PGc_3Y';
    const sb=createClient(SUPABASE_URL,SUPABASE_KEY);

    // ========== 暗号化ユーティリティ ==========
    const enc=new TextEncoder();
    const dec=new TextDecoder();
    const unb64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));

    async function deriveKey(pw,salt){
      const keyMat=await crypto.subtle.importKey(
        'raw',enc.encode(pw),'PBKDF2',false,['deriveKey']
      );
      return crypto.subtle.deriveKey(
        {name:'PBKDF2',salt,iterations:310000,hash:'SHA-256'},
        keyMat,{name:'AES-GCM',length:256},false,['encrypt','decrypt']
      );
    }

    async function decrypt(encB64,ivB64,saltB64,pw){
      const key=await deriveKey(pw,unb64(saltB64));
      const plain=await crypto.subtle.decrypt(
        {name:'AES-GCM',iv:unb64(ivB64)},
        key,unb64(encB64)
      );
      return dec.decode(plain);
    }

    // ========== URLからIDを取得 ==========
    const params=new URLSearchParams(location.search);
    const idFromUrl=params.get('id');
    if(idFromUrl){
      document.getElementById('letter-id').value=idFromUrl;
    }

    // 目のボタン
    document.getElementById('eye-btn').addEventListener('click',()=>{
      const i=document.getElementById('pw');
      i.type=i.type==='password'?'text':'password';
    });

    // Enterキー対応
    document.getElementById('pw').addEventListener('keydown',e=>{
      if(e.key==='Enter')document.getElementById('unlock-btn').click();
    });

    // ========== 復号 ==========
    document.getElementById('unlock-btn').addEventListener('click',async()=>{
      const id=document.getElementById('letter-id').value.trim();
      const pw=document.getElementById('pw').value;
      const errEl=document.getElementById('err-msg');

      errEl.classList.remove('show');

      if(!id){showErr('手紙のIDを入力してね');return}
      if(!pw){showErr('パスワードを入力してね');return}

      document.getElementById('form-card').style.display='none';
      document.getElementById('loading').classList.add('show');

      try{
        const{data,error}=await sb
          .from('secret_letters')
          .select('*')
          .eq('id',id)
          .single();

        if(error||!data){
          document.getElementById('form-card').style.display='block';
          document.getElementById('loading').classList.remove('show');
          showErr('手紙が見つからないよ。IDを確認してね');
          return;
        }

        // 有効期限チェック
        if(data.expires_at&&new Date(data.expires_at)<new Date()){
          document.getElementById('form-card').style.display='block';
          document.getElementById('loading').classList.remove('show');
          showErr('この手紙は期限切れだよ（削除済み）');
          return;
        }

        // 復号
        let title,body;
        try{
          [title,body]=await Promise.all([
            decrypt(data.title_enc,data.title_iv,data.title_salt,pw),
            decrypt(data.body_enc,data.body_iv,data.body_salt,pw)
          ]);
        }catch{
          document.getElementById('form-card').style.display='block';
          document.getElementById('loading').classList.remove('show');
          showErr('パスワードが違うよ');
          return;
        }

        document.getElementById('loading').classList.remove('show');
        showResult(title,body,data);

      }catch(e){
        document.getElementById('form-card').style.display='block';
        document.getElementById('loading').classList.remove('show');
        showErr('エラー: '+e.message);
      }
    });

    function showErr(msg){
      const el=document.getElementById('err-msg');
      el.textContent='❌ '+msg;
      el.classList.add('show');
    }

    function showResult(title,body,data){
      document.getElementById('r-title').textContent=title;
      document.getElementById('r-body').textContent=body;

      if(data.expires_at){
        const d=new Date(data.expires_at);
        const rem=d-new Date();
        const h=Math.max(0,Math.floor(rem/3600000));
        const m=Math.max(0,Math.floor((rem%3600000)/60000));
        const el=document.getElementById('r-expire');
        el.textContent=`⏳ 残り${h}時間${m}分`;
        el.style.display='';
      }

      const sent=new Date(data.created_at).toLocaleString('ja-JP');
      document.getElementById('r-meta').textContent=`送信日時: ${sent}`;

      document.getElementById('result-card').classList.add('show');
    }

    document.getElementById('back-btn').addEventListener('click',()=>{
      document.getElementById('result-card').classList.remove('show');
      document.getElementById('pw').value='';
      document.getElementById('err-msg').classList.remove('show');
      document.getElementById('form-card').style.display='block';
    });
  </script>
</body>
</html>
